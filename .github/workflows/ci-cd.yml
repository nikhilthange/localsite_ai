name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci
        env:
          MONGODB_URI: mongodb://localhost:27017/localsite_ai_test
          REDIS_URL: redis://localhost:6379
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          NVIDIA_BASE_URL: https://integrate.api.nvidia.com/v1
          NVIDIA_MODEL: meta/llama-3.3-70b-instruct
          JWT_ACCESS_SECRET: test-jwt-access-secret
          JWT_REFRESH_SECRET: test-jwt-refresh-secret
          COOKIE_SECRET: test-cookie-secret
          CSRF_SECRET: test-csrf-secret

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  docker:
    if: github.ref == 'refs/heads/main'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t localsite-ai-backend -f backend/Dockerfile ./backend

      - name: Build frontend image
        run: docker build -t localsite-ai-frontend -f infra/docker/Dockerfile.frontend .

      - name: Build worker image
        run: docker build -t localsite-ai-worker -f infra/docker/Dockerfile.worker ./backend
