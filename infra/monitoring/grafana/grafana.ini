# ============================================
# LocalSite AI - Grafana Configuration
# ============================================

[server]
domain = monitoring.localsiteai.com
root_url = https://monitoring.localsiteai.com
http_port = 3000
protocol = http
enable_gzip = true
enforce_domain = false
cookie_samesite = lax

[database]
type = sqlite3
path = /var/lib/grafana/grafana.db

[security]
admin_user = ${GF_SECURITY_ADMIN_USER}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
secret_key = ${GRAFANA_SECRET_KEY}
login_remember_days = 7
cookie_secure = true
cookie_samesite = lax
disable_gravatar = true
x_frame_options = SAMEORIGIN

[auth]
login_cookie_name = grafana_session
login_maximum_inactive_lifetime_days = 7
login_maximum_lifetime_days = 30
token_rotation_interval_minutes = 480
disable_login_form = false
disable_signout_menu = false
signout_redirect_url = https://app.localsiteai.com

[auth.anonymous]
enabled = false

[auth.basic]
enabled = true

[users]
default_theme = light
home_page = /d/localsite-ai/localsite-ai-overview
viewers_can_edit = false
editors_can_admin = false
user_invite_max_lifetime_duration = 24h
auto_assign_org_role = Viewer

[alerting]
enabled = true
execute_alerts = true
concurrent_render_limit = 5
notification_timeout_seconds = 30
max_attempts = 3

[metrics]
enabled = true
basic_auth_username = prometheus
basic_auth_password = ${GRAFANA_METRICS_PASSWORD}

[log]
mode = console
level = info

[log.console]
format = json

[panels]
disable_sanitize_html = false

[plugins]
enable_alpha = false
app_tls_skip_verify_insecure = false
