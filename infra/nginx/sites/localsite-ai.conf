# ============================================
# LocalSite AI - Virtual Host Config
# Domains:
#   api.localsiteai.com     - Backend API
#   app.localsiteai.com     - Frontend SPA
#   *.localsiteai.com       - Customer sites
# ============================================

# ------------------------------------------------
# HTTP -> HTTPS Redirect (all domains)
# ------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name api.localsiteai.com app.localsiteai.com localsiteai.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        break;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ------------------------------------------------
# API Backend - api.localsiteai.com
# ------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.localsiteai.com;

    ssl_certificate /etc/letsencrypt/live/api.localsiteai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.localsiteai.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/api.localsiteai.com/chain.pem;

    # HSTS (1 year)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Limit rate for API
    limit_req zone=api burst=50 nodelay;
    limit_conn addr 30;

    # ------ API Proxy ------
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_temp_file_write_size 64k;

        # CORS headers
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With, X-CSRF-Token" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Max-Age "86400" always;

        if ($request_method = OPTIONS) {
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # ------ Health Check ------
    location /health {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ------ WebSocket (Socket.IO) ------
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    # ------ Bull Board (Admin Only) ------
    location /admin/queues/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ------ Swagger API Docs ------
    location /api-docs/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Deny all other requests
    location / {
        return 404;
    }
}

# ------------------------------------------------
# Frontend SPA - app.localsiteai.com
# ------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.localsiteai.com;

    ssl_certificate /etc/letsencrypt/live/app.localsiteai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.localsiteai.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/app.localsiteai.com/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;

        # Don't cache index.html
        add_header Cache-Control "no-cache, must-revalidate, proxy-revalidate" always;
    }

    # Static assets with immutable caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Favicon / robots
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }
    location = /robots.txt {
        log_not_found off;
        access_log off;
    }

    # No one needs to see hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# ------------------------------------------------
# Wildcard - Customer sites (*.localsiteai.com)
# ------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ~^(?<subdomain>[^.]+)\.localsiteai\.com$;

    ssl_certificate /etc/letsencrypt/live/localsiteai.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localsiteai.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/localsiteai.com/chain.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Proxy to backend for customer website serving
    location / {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Subdomain $subdomain;
    }
}
