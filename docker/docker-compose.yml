version: "3.8"

networks:
  saas-network:
    driver: bridge

volumes:
  mongodb-data:
    driver: local
  redis-data:
    driver: local
  certbot-www:
    driver: local

services:
  mongodb:
    image: mongo:6
    container_name: saas-mongodb
    restart: unless-stopped
    networks:
      - saas-network
    volumes:
      - mongodb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-saas_website}
    ports:
      - "127.0.0.1:27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: saas-redis
    restart: unless-stopped
    networks:
      - saas-network
    volumes:
      - redis-data:/data
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: saas-backend
    restart: unless-stopped
    networks:
      - saas-network
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../backend/.env
    environment:
      MONGODB_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASSWORD:-secret}@mongodb:27017/${MONGO_DB:-saas_website}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      NODE_ENV: production
    ports:
      - "127.0.0.1:5000:5000"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: saas-frontend
    restart: unless-stopped
    networks:
      - saas-network
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: saas-nginx
    restart: unless-stopped
    networks:
      - saas-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certbot/www:/var/www/certbot:ro
      - ../certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - backend
      - frontend
